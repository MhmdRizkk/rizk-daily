<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Rizk" />
<meta name="theme-color" content="#F2F2F7" />
<title>Rizk</title>
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png" />
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png" />
<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png" />
<link rel="shortcut icon" href="icon-180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:         #F2F2F7;
  --surface:    #FFFFFF;
  --label:      #000000;
  --label2:     rgba(60,60,67,0.6);
  --label3:     rgba(60,60,67,0.3);
  --label4:     rgba(60,60,67,0.18);
  --sep:        rgba(60,60,67,0.12);
  --sep-op:     #C6C6C8;
  --blue:       #007AFF;
  --green:      #34C759;
  --orange:     #FF9500;
  --red:        #FF3B30;
  --purple:     #AF52DE;
  --teal:       #5AC8FA;
  --pink:       #FF2D55;
  --yellow:     #FFCC00;
  --sat: env(safe-area-inset-top, 44px);
  --sab: env(safe-area-inset-bottom, 34px);
  --font: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Nunito', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { height: 100%; }

body {
  height: 100%;
  height: 100dvh;
  background: var(--bg);
  font-family: var(--font);
  color: var(--label);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
}

/* status bar */
.sb { height: var(--sat); flex-shrink: 0; }

/* scroll */
.scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}
.scroll::-webkit-scrollbar { display: none; }

/* pages */
.page { display: none; padding-bottom: calc(var(--sab) + 90px); }
.page.active { display: block; animation: pgIn 0.22s ease; }
@keyframes pgIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── PAGE HEADER ── */
.ph {
  padding: 8px 20px 10px;
  position: sticky; top: 0; z-index: 10;
  background: rgba(242,242,247,0.92);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.ph-left {}
.ph-title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1;
  color: var(--label);
}
.ph-sub {
  font-size: 14px;
  color: var(--label2);
  margin-top: 2px;
  font-weight: 400;
}
.ph-badge {
  font-size: 12px; font-weight: 600;
  background: var(--blue); color: white;
  padding: 4px 11px; border-radius: 20px;
  margin-bottom: 6px;
}
.ph-nav {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.nav-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--surface); border: none;
  color: var(--blue); font-size: 16px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-family: var(--font);
  transition: background 0.12s;
}
.nav-btn:active { background: var(--label4); }

/* ── SECTION LABEL ── */
.sl {
  font-size: 13px; font-weight: 600; letter-spacing: 0.3px;
  text-transform: uppercase; color: var(--label2);
  padding: 20px 20px 8px;
}

/* ── GROUPED LIST ── */
.group {
  background: var(--surface);
  border-radius: 16px;
  margin: 0 16px 10px;
  overflow: hidden;
}

.row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px;
  background: var(--surface);
  position: relative;
  min-height: 54px;
  cursor: pointer;
  transition: background 0.1s;
}
.row:active { background: rgba(0,0,0,0.04); }
.row + .row::before {
  content: '';
  position: absolute;
  top: 0; left: 56px; right: 0;
  height: 0.5px;
  background: var(--sep);
}

/* ── CHECK ROWS ── */
.ck-circle {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--sep-op);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, border-color 0.2s;
}
.row.done .ck-circle { background: var(--green); border-color: var(--green); }

.ck-svg {
  width: 14px; height: 14px;
  stroke: white; stroke-width: 2.5;
  stroke-linecap: round; stroke-linejoin: round;
  fill: none; opacity: 0;
  transition: opacity 0.12s;
}
.row.done .ck-svg { opacity: 1; }

.ck-texts { flex: 1; }
.ck-title {
  font-size: 17px; font-weight: 400; color: var(--label);
  transition: color 0.2s;
}
.row.done .ck-title {
  color: var(--label3);
  text-decoration: line-through;
  text-decoration-color: var(--label3);
}
.ck-sub { font-size: 12px; color: var(--label2); margin-top: 1px; }

.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── PROGRESS ── */
.prog-card {
  background: var(--surface);
  border-radius: 16px;
  margin: 0 16px 10px;
  padding: 14px 16px;
}
.prog-top {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 10px;
}
.prog-label { font-size: 15px; font-weight: 600; }
.prog-frac  { font-size: 13px; color: var(--label2); font-weight: 500; }
.prog-track { height: 6px; background: var(--label4); border-radius: 3px; overflow: hidden; }
.prog-fill  {
  height: 100%; border-radius: 3px; background: var(--green);
  transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── EVENT CARDS ── */
.ev-card {
  background: var(--surface);
  border-radius: 16px;
  margin: 0 16px 10px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  transition: transform 0.1s;
}
.ev-card:active { transform: scale(0.98); }
.ev-info { flex: 1; min-width: 0; }
.ev-name {
  font-size: 15px; font-weight: 600; color: var(--label);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ev-meta { font-size: 12px; color: var(--label2); margin-top: 2px; }
.ev-badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 9px; border-radius: 20px;
  white-space: nowrap; flex-shrink: 0;
}
.b-work     { background:rgba(0,122,255,.1);  color:var(--blue);   }
.b-shia     { background:rgba(175,82,222,.1); color:var(--purple); }
.b-national { background:rgba(90,200,250,.15);color:#0099CC;       }
.b-personal { background:rgba(255,149,0,.1);  color:var(--orange); }
.b-birthday { background:rgba(255,45,85,.1);  color:var(--pink);   }
.b-finance  { background:rgba(52,199,89,.1);  color:#248A3D;       }

/* ── MINI CAL ── */
.mini-cal {
  background: var(--surface); border-radius: 16px;
  margin: 0 16px 12px; padding: 12px 8px 8px;
}
.mc-hds { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
.mc-hd  { text-align: center; font-size: 11px; font-weight: 600; color: var(--label2); padding: 4px 0; }
.mc-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; }
.mc-d {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 400; color: var(--label);
  border-radius: 50%; cursor: pointer; position: relative;
  transition: background 0.1s;
}
.mc-d:active { background: var(--label4); }
.mc-d.other  { color: var(--label3); }
.mc-d.today  { background: var(--blue); color: white; font-weight: 600; }
.mc-d.hev::after {
  content:''; position:absolute; bottom:3px; left:50%; transform:translateX(-50%);
  width:4px; height:4px; border-radius:50%; background:var(--blue);
}
.mc-d.today.hev::after { background:white; }

/* cal event list item */
.cal-row {
  background: var(--surface); border-radius: 16px;
  margin: 0 16px 10px; padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
}
.cal-date { text-align: center; min-width: 36px; }
.cal-dn { font-size: 22px; font-weight: 700; color: var(--label); line-height: 1; }
.cal-dw { font-size: 10px; font-weight: 600; color: var(--label3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.cal-div { width: 1px; height: 36px; background: var(--sep); flex-shrink: 0; }
.cal-info { flex: 1; min-width: 0; }
.cal-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-sub  { font-size: 12px; color: var(--label2); margin-top: 2px; }

/* ── BUDGET CARD ── */
.bud-card {
  margin: 0 16px 10px;
  background: var(--blue);
  border-radius: 20px;
  padding: 20px;
  color: white;
}
.bud-lbl { font-size: 13px; font-weight: 500; opacity: 0.8; margin-bottom: 4px; }
.bud-amt { font-size: 44px; font-weight: 700; letter-spacing: -1px; line-height: 1.05; }
.bud-amt.neg { color: rgba(255,255,255,0.65); }
.bud-track { height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; margin: 14px 0 8px; overflow: hidden; }
.bud-fill { height: 100%; border-radius: 2px; background: white; transition: width .5s cubic-bezier(.34,1.56,.64,1); }
.bud-fill.ov { background: rgba(255,255,255,0.5); }
.bud-meta { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.8; font-weight: 500; }

/* expense row */
.exp-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; background: var(--surface);
  position: relative; min-height: 58px;
  transition: background 0.1s;
}
.exp-row + .exp-row::before {
  content:''; position:absolute; top:0; left:60px; right:0;
  height:0.5px; background:var(--sep);
}
.exp-ico {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.exp-txt { flex: 1; }
.exp-name { font-size: 15px; font-weight: 400; color: var(--label); }
.exp-cat  { font-size: 12px; color: var(--label2); margin-top: 1px; }
.exp-inp {
  background: transparent; border: none; outline: none;
  font-size: 15px; font-weight: 500; color: var(--label);
  font-family: var(--font); text-align: right; width: 80px;
  -webkit-appearance: none;
}
.exp-del {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--red); border: none; color: white;
  font-size: 15px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; font-weight: 300; line-height: 1;
  transition: transform 0.12s;
}
.exp-del:active { transform: scale(0.88); }

/* add button */
.add-btn {
  margin: 0 16px 10px;
  width: calc(100% - 32px);
  height: 50px;
  background: var(--surface); border: none; border-radius: 16px;
  font-size: 15px; font-weight: 600; color: var(--blue);
  font-family: var(--font); display: flex; align-items: center;
  justify-content: center; gap: 6px; cursor: pointer;
  transition: background 0.12s;
}
.add-btn:active { background: rgba(0,122,255,.06); }

/* ── SHEET ── */
.sheet-bg {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.35);
  -webkit-backdrop-filter: blur(3px);
  backdrop-filter: blur(3px);
  align-items: flex-end;
}
.sheet-bg.open { display: flex; animation: ov .2s ease; }
@keyframes ov { from{opacity:0} to{opacity:1} }

.sheet {
  width: 100%; max-width: 430px; margin: 0 auto;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 12px 20px calc(16px + var(--sab));
  animation: shUp .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes shUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.sh-handle { width:36px; height:4px; background:var(--label4); border-radius:2px; margin:0 auto 20px; }
.sh-title  { font-size:17px; font-weight:700; text-align:center; margin-bottom:20px; }
.sh-field  { margin-bottom:14px; }
.sh-lbl    { font-size:12px; font-weight:600; color:var(--label2); text-transform:uppercase; letter-spacing:.4px; display:block; margin-bottom:6px; }
.sh-inp {
  width:100%; height:46px; background:var(--bg); border:none;
  border-radius:13px; padding:0 14px; font-size:15px;
  font-family:var(--font); color:var(--label); outline:none;
  -webkit-appearance:none; appearance:none;
  transition:background .15s;
}
.sh-inp:focus { background:rgba(0,122,255,.06); }
.sh-acts { display:flex; gap:10px; margin-top:20px; }
.ios-btn {
  flex:1; height:50px; border-radius:16px; border:none;
  font-size:15px; font-weight:600; font-family:var(--font); cursor:pointer;
  transition:opacity .12s;
}
.ios-btn:active { opacity:.7; }
.ios-p { background:var(--blue); color:white; }
.ios-s { background:var(--bg); color:var(--blue); }

/* ── TAB BAR ── */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  max-width: 430px; margin: 0 auto;
  background: rgba(242,242,247,.92);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border-top: .5px solid var(--sep);
  display: flex;
  padding-bottom: var(--sab);
}
.tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 8px 0 4px; cursor: pointer; gap: 3px;
  border: none; background: none; font-family: var(--font);
  -webkit-tap-highlight-color: transparent;
  transition: opacity .1s;
}
.tab:active { opacity: .6; }
.tab-ic { font-size: 24px; line-height: 1; transition: transform .2s cubic-bezier(.34,1.56,.64,1); }
.tab.active .tab-ic { transform: scale(1.1); }
.tab-lb { font-size: 10px; font-weight: 500; color: var(--label3); transition: color .15s; }
.tab.active .tab-lb { color: var(--blue); }

/* ── EMPTY STATE ── */
.empty { text-align:center; padding:40px 20px; }
.empty-ic { font-size:40px; margin-bottom:12px; }
.empty-t  { font-size:15px; font-weight:500; color:var(--label2); }
.empty-s  { font-size:13px; color:var(--label3); margin-top:4px; }

/* bounce anim */
@keyframes ckBounce {
  0%{transform:scale(1)} 35%{transform:scale(.82)} 70%{transform:scale(1.18)} 100%{transform:scale(1)}
}
.ck-bounce { animation: ckBounce .28s ease; }
</style>
</head>
<body>
<div class="app">
  <div class="sb"></div>
  <div class="scroll" id="scroll">

    <!-- ████ TODAY ████ -->
    <div class="page active" id="page-today">
      <div class="ph">
        <div class="ph-left">
          <div class="ph-title" id="todayTitle">Today</div>
          <div class="ph-sub" id="todaySub">—</div>
        </div>
        <div class="ph-badge" id="badge">0/0</div>
      </div>

      <!-- Progress -->
      <div class="prog-card">
        <div class="prog-top">
          <span class="prog-label">Daily Progress</span>
          <span class="prog-frac" id="progFrac">0 of 0 done</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      </div>

      <div class="sl">Tasks</div>
      <div class="group" id="ckGroup"></div>

      <div class="sl">Today's Events</div>
      <div id="todayEvs"></div>
    </div>

    <!-- ████ CALENDAR ████ -->
    <div class="page" id="page-calendar">
      <div class="ph">
        <div class="ph-left">
          <div class="ph-title" id="calTitle">Calendar</div>
        </div>
        <div class="ph-nav">
          <button class="nav-btn" id="calPrev">‹</button>
          <button class="nav-btn" id="calNext">›</button>
        </div>
      </div>
      <div class="mini-cal">
        <div class="mc-hds" id="mcHds"></div>
        <div class="mc-grid" id="mcGrid"></div>
      </div>
      <div id="calList"></div>
    </div>

    <!-- ████ EXPENSES ████ -->
    <div class="page" id="page-expenses">
      <div class="ph">
        <div class="ph-left">
          <div class="ph-title">Expenses</div>
          <div class="ph-sub" id="expSub">—</div>
        </div>
        <div class="ph-nav">
          <button class="nav-btn" id="budPrev">‹</button>
          <button class="nav-btn" id="budNext">›</button>
        </div>
      </div>

      <div class="bud-card">
        <div class="bud-lbl">Remaining this month</div>
        <div class="bud-amt" id="budAmt">$1,000</div>
        <div class="bud-track"><div class="bud-fill" id="budFill" style="width:0%"></div></div>
        <div class="bud-meta">
          <span id="budSpent">$0 spent</span>
          <span id="budIncome">of $1,000</span>
        </div>
      </div>

      <div class="sl">This Month</div>
      <div class="group" id="expGroup"></div>
      <button class="add-btn" id="addExpBtn"><span style="font-size:18px;font-weight:300">+</span> Add Expense</button>
      <div style="height:20px"></div>
    </div>

  </div><!-- /scroll -->

  <!-- ████ TAB BAR ████ -->
  <div class="tabbar">
    <button class="tab active" data-tab="today">
      <span class="tab-ic">☀️</span>
      <span class="tab-lb">Today</span>
    </button>
    <button class="tab" data-tab="calendar">
      <span class="tab-ic">📅</span>
      <span class="tab-lb">Calendar</span>
    </button>
    <button class="tab" data-tab="expenses">
      <span class="tab-ic">💳</span>
      <span class="tab-lb">Expenses</span>
    </button>
  </div>
</div>

<!-- ████ SHEET ████ -->
<div class="sheet-bg" id="expSheet">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title">New Expense</div>
    <div class="sh-field">
      <label class="sh-lbl">Description</label>
      <input class="sh-inp" id="expName" type="text" placeholder="e.g. Groceries" autocomplete="off" />
    </div>
    <div class="sh-field">
      <label class="sh-lbl">Amount ($)</label>
      <input class="sh-inp" id="expAmt" type="number" placeholder="0.00" inputmode="decimal" min="0" step="0.01" />
    </div>
    <div class="sh-field">
      <label class="sh-lbl">Category</label>
      <select class="sh-inp" id="expCat">
        <option value="Food">🍽️  Food</option>
        <option value="Transport">🚌  Transport</option>
        <option value="Entertainment">🎮  Entertainment</option>
        <option value="Health">💊  Health</option>
        <option value="Personal">🧴  Personal</option>
        <option value="Social">🌙  Social</option>
        <option value="Other">📦  Other</option>
      </select>
    </div>
    <div class="sh-acts">
      <button class="ios-btn ios-s" id="expCancel">Cancel</button>
      <button class="ios-btn ios-p" id="expSave">Add</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════
//  DATA
// ═══════════════════════════════════
const INCOME = 1000;
const ML = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DF = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function pad(n){ return String(n).padStart(2,'0'); }

const CAT_COLOR = {
  Prayer:'#AF52DE', Hygiene:'#5AC8FA', Gaming:'#007AFF',
  Social:'#FF2D55', Finance:'#34C759', 'Self-Growth':'#FF9500',
  Errands:'#8E8E93', Discipline:'#FF3B30'
};
const CAT_BG = {
  Food:'#FFF3E0',Transport:'#E3F2FD',Entertainment:'#F3E5F5',
  Health:'#E8F5E9',Personal:'#E0F7FA',Social:'#FCE4EC',Other:'#F5F5F5'
};
const CAT_EMO = {
  Food:'🍽️',Transport:'🚌',Entertainment:'🎮',
  Health:'💊',Personal:'🧴',Social:'🌙',Other:'📦'
};

const TASKS = [
  {id:'p1',title:'Fajr',        sub:'Dawn prayer',        cat:'Prayer'},
  {id:'p2',title:'Dhuhr',       sub:'Noon prayer',        cat:'Prayer'},
  {id:'p3',title:'Asr',         sub:'Afternoon prayer',   cat:'Prayer'},
  {id:'p4',title:'Maghrib',     sub:'Sunset prayer',      cat:'Prayer'},
  {id:'p5',title:'Isha',        sub:'Night prayer',       cat:'Prayer'},
  {id:'h1',title:'Brush teeth ×2', sub:'Morning & night', cat:'Hygiene'},

// ═══════════════════════════════════
//  STATE
// ═══════════════════════════════════
let calDate   = new Date();
let budDate   = new Date();
let expenses  = JSON.parse(localStorage.getItem('rizk_exp2') || '{}');
function saveExp(){ localStorage.setItem('rizk_exp2', JSON.stringify(expenses)); }

// checks: auto-reset daily
function todayKey(){
  const d=new Date();
  return `chk${d.getFullYear()}${d.getMonth()}${d.getDate()}`;
}
function loadChecks(){
  // purge old keys
  Object.keys(localStorage).filter(k=>k.startsWith('chk') && k!==todayKey())
    .forEach(k=>localStorage.removeItem(k));
  return JSON.parse(localStorage.getItem(todayKey())||'{}');
}
function saveChecks(s){ localStorage.setItem(todayKey(), JSON.stringify(s)); }

let checks = loadChecks();

// ═══════════════════════════════════
//  HELPERS
// ═══════════════════════════════════
function sameDay(a,b){
  return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
}
function eventsFor(d){
  const mm=pad(d.getMonth()+1), dd=pad(d.getDate()), full=`${d.getFullYear()}-${mm}-${dd}`;
  return EVENTS.filter(e=>{
    if(e.date==='*-*-*') return e.wd&&e.wd.includes(d.getDay());
    if(e.r){const p=e.date.split('-');return p[1]===mm&&p[2]===dd;}
    return e.date===full;
  });
}
function badgeCls(t){
  return {work:'b-work',shia:'b-shia',national:'b-national',
          personal:'b-personal',birthday:'b-birthday',finance:'b-finance'}[t]||'b-personal';
}
function dotCol(t){
  return {work:'#007AFF',shia:'#AF52DE',national:'#5AC8FA',
          personal:'#FF9500',birthday:'#FF2D55',finance:'#34C759'}[t]||'#8E8E93';
}
function typeLbl(t){
  return {work:'Work',shia:'Islamic',national:'Holiday',
          personal:'Personal',birthday:'Birthday',finance:'Finance'}[t]||t;
}

// ═══════════════════════════════════
//  HEADER
// ═══════════════════════════════════
function updateHeader(){
  const n=new Date();
  document.getElementById('todayTitle').textContent=`${MS[n.getMonth()]} ${n.getDate()}`;
  document.getElementById('todaySub').textContent=DF[n.getDay()];
}

// ═══════════════════════════════════
//  CHECKLIST
// ═══════════════════════════════════
function renderChecks(){
  const g=document.getElementById('ckGroup');
  g.innerHTML='';
  let done=0;
  TASKS.forEach(t=>{
    const isDone=!!checks[t.id];
    if(isDone) done++;
    const row=document.createElement('div');
    row.className='row'+(isDone?' done':'');
    row.innerHTML=`
      <div class="ck-circle">
        <svg class="ck-svg" viewBox="0 0 14 14"><polyline points="2,7 5.5,10.5 12,3.5"/></svg>
      </div>
      <div class="ck-texts">
        <div class="ck-title">${t.title}</div>
        <div class="ck-sub">${t.sub}</div>
      </div>
      <div class="dot" style="background:${CAT_COLOR[t.cat]||'#8E8E93'}"></div>
    `;
    row.addEventListener('click',()=>{
      checks[t.id]=!checks[t.id];
      saveChecks(checks);
      row.classList.toggle('done');
      const ic=row.querySelector('.ck-circle');
      ic.classList.add('ck-bounce');
      setTimeout(()=>ic.classList.remove('ck-bounce'),300);
      updateProg();
    });
    g.appendChild(row);
  });
  updateProg(done);
}

function updateProg(d){
  const total=TASKS.length;
  const done=d!==undefined?d:TASKS.filter(t=>checks[t.id]).length;
  const pct=total?(done/total)*100:0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progFrac').textContent=`${done} of ${total} done`;
  document.getElementById('badge').textContent=`${done}/${total}`;
}

// ═══════════════════════════════════
//  TODAY EVENTS
// ═══════════════════════════════════
function renderTodayEvs(){
  const a=document.getElementById('todayEvs');
  a.innerHTML='';
  const evs=eventsFor(new Date());
  if(!evs.length){
    a.innerHTML=`<div class="empty"><div class="empty-ic">🗓️</div><div class="empty-t">Nothing scheduled</div><div class="empty-s">Enjoy your free time</div></div>`;
    return;
  }
  evs.forEach(ev=>{
    const c=document.createElement('div');
    c.className='ev-card';
    c.innerHTML=`
      <div class="dot" style="background:${dotCol(ev.type)};width:10px;height:10px"></div>
      <div class="ev-info">
        <div class="ev-name">${ev.name}</div>
        <div class="ev-meta">${ev.time?ev.time+' · ':''}${typeLbl(ev.type)}</div>
      </div>
      <span class="ev-badge ${badgeCls(ev.type)}">${typeLbl(ev.type)}</span>
    `;
    a.appendChild(c);
  });
}

// ═══════════════════════════════════
//  CALENDAR
// ═══════════════════════════════════
function renderCal(){
  const y=calDate.getFullYear(), m=calDate.getMonth();
  document.getElementById('calTitle').textContent=`${ML[m]} ${y}`;

  // headers
  const hds=document.getElementById('mcHds');
  hds.innerHTML='';
  ['S','M','T','W','T','F','S'].forEach(d=>{
    const el=document.createElement('div');
    el.className='mc-hd'; el.textContent=d;
    hds.appendChild(el);
  });

  // grid
  const grid=document.getElementById('mcGrid');
  grid.innerHTML='';
  const fd=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  const pm=new Date(y,m,0).getDate();
  const today=new Date();

  for(let i=0;i<fd;i++){
    const el=document.createElement('div');
    el.className='mc-d other';
    el.textContent=pm-fd+1+i;
    grid.appendChild(el);
  }
  for(let d=1;d<=dim;d++){
    const date=new Date(y,m,d);
    const evs=eventsFor(date);
    const isT=sameDay(date,today);
    const el=document.createElement('div');
    el.className='mc-d'+(isT?' today':'')+((!isT&&evs.length)?' hev':'');
    el.textContent=d;
    grid.appendChild(el);
  }

  // events list
  const list=document.getElementById('calList');
  list.innerHTML='';

  const groups=[
    {lbl:'Holidays & Religious',types:['national','shia'],items:[]},
    {lbl:'Work & Schedule',    types:['work'],            items:[]},
    {lbl:'Personal',           types:['birthday','personal','finance'],items:[]},
  ];

  for(let d=1;d<=dim;d++){
    const date=new Date(y,m,d);
    eventsFor(date).forEach(ev=>{
      const g=groups.find(g2=>g2.types.includes(ev.type));
      if(g) g.items.push({date,ev});
    });
  }

  groups.forEach(g=>{
    if(!g.items.length) return;
    let items=g.items;
    if(g.lbl==='Work & Schedule'){
      const cnt=items.length;
      items=[{...items[0],_cnt:cnt}];
    }
    const lbl=document.createElement('div');
    lbl.className='sl'; lbl.textContent=g.lbl;
    list.appendChild(lbl);

    const seen=new Set();
    items.forEach(({date,ev,_cnt})=>{
      const uk=`${ev.name}-${date.getDate()}`;
      if(seen.has(uk)) return; seen.add(uk);
      const isT=sameDay(date,today);
      const c=document.createElement('div');
      c.className='cal-row';
      c.innerHTML=`
        <div class="cal-date">
          <div class="cal-dn" style="${isT?'color:var(--blue)':''}">${date.getDate()}</div>
          <div class="cal-dw">${DS[date.getDay()]}</div>
        </div>
        <div class="cal-div"></div>
        <div class="cal-info">
          <div class="cal-name">${ev.name}</div>
          <div class="cal-sub">${_cnt?_cnt+' days this month':(ev.time||typeLbl(ev.type))}</div>
        </div>
        <span class="ev-badge ${badgeCls(ev.type)}">${typeLbl(ev.type)}</span>
      `;
      list.appendChild(c);
    });
  });
}

document.getElementById('calPrev').onclick=()=>{ calDate=new Date(calDate.getFullYear(),calDate.getMonth()-1,1); renderCal(); };
document.getElementById('calNext').onclick=()=>{ calDate=new Date(calDate.getFullYear(),calDate.getMonth()+1,1); renderCal(); };

// ═══════════════════════════════════
//  EXPENSES
// ═══════════════════════════════════
function bKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}`; }

function renderExp(){
  const key=bKey(budDate);
  const items=expenses[key]||[];
  const spent=items.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const rem=INCOME-spent;
  const pct=Math.min((spent/INCOME)*100,100);

  document.getElementById('expSub').textContent=`${ML[budDate.getMonth()]} ${budDate.getFullYear()}`;
  document.getElementById('budAmt').textContent=(rem<0?'-$':'$')+Math.abs(rem).toFixed(0);
  document.getElementById('budAmt').className='bud-amt'+(rem<0?' neg':'');
  document.getElementById('budSpent').textContent=`$${spent.toFixed(0)} spent`;
  document.getElementById('budIncome').textContent=`of $${INCOME}`;
  document.getElementById('budFill').style.width=pct+'%';
  document.getElementById('budFill').className='bud-fill'+(rem<0?' ov':'');

  const g=document.getElementById('expGroup');
  g.innerHTML='';

  if(!items.length){
    g.innerHTML=`<div class="empty"><div class="empty-ic">💸</div><div class="empty-t">No expenses yet</div><div class="empty-s">Tap + Add Expense below</div></div>`;
    return;
  }

  items.forEach(item=>{
    const row=document.createElement('div');
    row.className='exp-row';
    row.innerHTML=`
      <div class="exp-ico" style="background:${CAT_BG[item.cat]||'#F5F5F5'}">${CAT_EMO[item.cat]||'📦'}</div>
      <div class="exp-txt">
        <div class="exp-name">${item.name}</div>
        <div class="exp-cat">${item.cat}</div>
      </div>
      <input class="exp-inp" type="number" value="${parseFloat(item.amount).toFixed(2)}"
             inputmode="decimal" min="0" step="0.01" data-id="${item.id}" />
      <button class="exp-del" data-id="${item.id}" aria-label="Delete">×</button>
    `;
    row.querySelector('.exp-inp').addEventListener('change',e=>{
      const l=expenses[key];
      const i=l.findIndex(x=>x.id===item.id);
      if(i!==-1){l[i].amount=parseFloat(e.target.value)||0;saveExp();renderExp();}
    });
    row.querySelector('.exp-del').addEventListener('click',()=>{
      expenses[key]=(expenses[key]||[]).filter(x=>x.id!==item.id);
      saveExp(); renderExp();
    });
    g.appendChild(row);
  });
}

document.getElementById('budPrev').onclick=()=>{ budDate=new Date(budDate.getFullYear(),budDate.getMonth()-1,1); renderExp(); };
document.getElementById('budNext').onclick=()=>{ budDate=new Date(budDate.getFullYear(),budDate.getMonth()+1,1); renderExp(); };

document.getElementById('addExpBtn').onclick=()=>{
  document.getElementById('expSheet').classList.add('open');
  setTimeout(()=>document.getElementById('expName').focus(),350);
};
document.getElementById('expCancel').onclick=()=>document.getElementById('expSheet').classList.remove('open');
document.getElementById('expSheet').addEventListener('click',e=>{
  if(e.target===document.getElementById('expSheet'))
    document.getElementById('expSheet').classList.remove('open');
});
document.getElementById('expSave').onclick=()=>{
  const name=document.getElementById('expName').value.trim();
  const amount=parseFloat(document.getElementById('expAmt').value)||0;
  const cat=document.getElementById('expCat').value;
  if(!name) return;
  const key=bKey(budDate);
  if(!expenses[key]) expenses[key]=[];
  expenses[key].push({id:Date.now().toString(),name,cat,amount});
  saveExp(); renderExp();
  document.getElementById('expName').value='';
  document.getElementById('expAmt').value='';
  document.getElementById('expSheet').classList.remove('open');
};

document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-'+btn.dataset.tab).classList.add('active');
    document.getElementById('scroll').scrollTop=0;
  });
});

renderChecks();

renderCal();
renderExp();

function schedMidnight(){
  const now=new Date();
  const next=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,3);
  setTimeout(()=>{
    checks={};
    renderChecks();
    updateHeader();
    renderTodayEvs();
    schedMidnight();
  }, next-now);
}
schedMidnight();
